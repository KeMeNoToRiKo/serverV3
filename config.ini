;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;         AI PROVIDER CONFIG          ;
;  Edit this file to select which AI  ;
;  provider to use for your project.  ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;       READ THIS BEFORE EDITING      ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;
; To enable a provider, REMOVE the semicolon (;) before the provider line.
; To disable a provider, ADD a semicolon (;) before the provider line.
; Only ONE provider should be active at a time.


; --- OLLAMA ---
; To use Ollama, make sure you have Ollama gemma3 installed.
; See: https://ollama.com/library for available models.

; --- GEMINI ---
; To use Gemini, set your API key in the .env file as GEMINI_API_KEY.
; If GEMINI_API_KEY is missing or invalid, Gemini will not work.




; --- SET THE PROVIDER HERE ---
[ai]
provider=none
;provider=none
;provider=ollama

;provider=gemini

[model]
gemini=gemini-2.0-flash
ollama=gemma3

[prompt]
masterPrompt=You will answer the question only in the given choices of answers. If you think there is no correct answer, you will guess the best answer from the given choices. If asked to choose more than one answer, separate them by a newline\nQuestion:
